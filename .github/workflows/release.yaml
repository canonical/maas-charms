name: Release Charms to Edge and Publish Libraries

on:
  push:
    branches:
      - main
      - track/*

jobs:
  detect-region-changes:
    name: Detect changes to maas-region charm
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.echo-changes.outputs.any_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Determine changed files in the commit
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # Version 47.0.6
        with:
          files: |
            maas-region/**
      - name: Echo changed files
        id: echo-changes
        run: |
          echo "Changes made: ${{ steps.changed-files.outputs.any_changed }}"
          echo "Changed files: ${{ steps.changed-files.outputs.all_changed_files }}"
          echo "any_changed=${{ steps.changed-files.outputs.any_changed }}" >> $GITHUB_OUTPUT

  release-region:
    name: Release MAAS Region charm to edge
    needs: detect-region-changes
    if: needs.detect-region-changes.outputs.any_changed == 'true'
    uses: canonical/operator-workflows/.github/workflows/publish_charm.yaml@4e1f0ab968d84de47fe6cf179d8fce7256f7494f # main as of 2026-07-01
    permissions:
      contents: write
      packages: write
      actions: read
    secrets: inherit
    with:
      working-directory: maas-region
      channel: latest/edge
      tag-prefix: maas-region
