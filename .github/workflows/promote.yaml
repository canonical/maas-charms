name: Promote Charm

on:
  workflow_dispatch:
    inputs:
      charm:
        type: choice
        description: Charm to promote
        options:
          - maas-region
      promotion:
        type: choice
        description: Channel to promote from
        options:
          - edge -> beta
          - beta -> candidate
          - candidate -> stable

jobs:
  promote:
    name: Promote
    uses: canonical/observability/.github/workflows/charm-promote.yaml@5e76ffc10eb6b4b2c6b7537e1d1398b64ee438d4 # Branch v0
    with:
      charm-path: ${{ github.event.inputs.charm }}
      promotion: ${{ github.event.inputs.promotion }}
    secrets: inherit
