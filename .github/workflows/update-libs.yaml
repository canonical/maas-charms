name: Auto-update Charm Libraries

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0,4,8,12,16,20 * * *"

jobs:
  update-lib-region:
    name: Check libraries
uses: canonical/operator-workflows/.github/workflows/auto_update_charm_libs.yaml@main
    permissions:
      id-token: write
      pull-requests: write
      contents: write
    secrets: inherit
    with:
      working-directory: maas-region