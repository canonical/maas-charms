name: Auto-update Charm Libraries
on:
  # Manual trigger
  workflow_dispatch:
  # Check regularly the upstream every four hours
  schedule:
    - cron: "0 0,4,8,12,16,20 * * *"

jobs:
  update-lib-region:
    name: Check libraries
    uses: canonical/observability/.github/workflows/charm-update-libs.yaml@c8b90c2e6dea32e59a5deb089c3e76565bdee8b3 # Branch v0
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit
    with:
      charm-path: maas-region
      commit-username: maas-lander
      commit-email: 115650013+maas-lander@users.noreply.github.com
      charmcraft-channel: latest/stable
