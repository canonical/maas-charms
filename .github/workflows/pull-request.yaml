name: Pull Requests

on:
  pull_request:
    branches:
      - main
      - track/*

jobs:
quality-checks:
    name: Quality Checks
    uses: canonical/operator-workflows/.github/workflows/test.yaml@main
    permissions:
      contents: read
      pull-requests: write
    secrets: inherit
    with:
      working-directory: maas-region
      with-uv: true
      require-check-lib: false

  integration-tests:
    name: Integration Tests
    uses: canonical/operator-workflows/.github/workflows/integration_test.yaml@main
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      working-directory: maas-region
      provider: lxd
      juju-channel: 3.6/stable
      with-uv: true
      charmcraft-channel: latest/stable