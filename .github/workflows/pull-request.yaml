name: Pull Requests

on:
  pull_request:
    branches:
      - main
      - track/*

jobs:
  pull-request-region:
    name: PR Region
    uses: canonical/observability/.github/workflows/charm-pull-request.yaml@52031bd3ea837bc1836ca52bae01bd263e9213fd # Branch v0
    permissions:
      security-events: write
      actions: read
      contents: write
    secrets: inherit
    with:
      charm-path: maas-region
      juju-channel: 3.6/stable
      python-version: "3.10"
      provider: lxd
